<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeVault | Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>SafeVault 🔐</h1>
    <p>Create your secure account</p>

    <input type="text" id="name" placeholder="Full name">
    <input type="email" id="email" placeholder="Email address">
    <input type="password" id="password" placeholder="Password">

    <div class="password-rules">
      Password must contain:
      <ul>
        <li>Minimum 10 characters</li>
        <li>Uppercase letter</li>
        <li>Lowercase letter</li>
        <li>Number</li>
        <li>Special character</li>
      </ul>
    </div>

    <div class="strength-container">
      <div id="strength-bar"></div>
    </div>
    <p id="strength-text"></p>

    <button type="button" id="registerBtn" class="primary-btn">Create Account →</button>

    <p class="link">
      Already have an account? <a href="index.html">Login</a>
    </p>
  </div>

<script src="toast.js"></script>
<script>
document.getElementById("registerBtn").addEventListener("click", async () => {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!name || !email || !password) {
    toast("All fields are required", "warning");
    return;
  }

  try {
    const response = await fetch("http://localhost:5000/api/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, password })
    });

    const data = await response.json();
    if (!response.ok) { toast(data.message, "error"); return; }
    toast("Account created! Please login.", "success");
    setTimeout(() => window.location.href = "index.html", 1500);
  } catch (error) {
    toast("Server error. Please try again.", "error");
    console.error(error);
  }
});

const passwordInput = document.getElementById("password");
const strengthBar = document.getElementById("strength-bar");
const strengthText = document.getElementById("strength-text");

passwordInput.addEventListener("input", () => {
  const password = passwordInput.value;
  let strength = 0;
  if (password.length >= 10) strength++;
  if (/[A-Z]/.test(password)) strength++;
  if (/[a-z]/.test(password)) strength++;
  if (/[0-9]/.test(password)) strength++;
  if (/[^A-Za-z0-9]/.test(password)) strength++;

  if (strength <= 2) {
    strengthBar.style.width = "33%";
    strengthBar.style.background = "#ff4f6a";
    strengthText.textContent = "WEAK";
  } else if (strength <= 4) {
    strengthBar.style.width = "66%";
    strengthBar.style.background = "#ffb547";
    strengthText.textContent = "MEDIUM";
  } else {
    strengthBar.style.width = "100%";
    strengthBar.style.background = "#00e09e";
    strengthText.textContent = "STRONG";
  }
});
</script>
</body>
</html>
