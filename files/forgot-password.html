<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | SafeVault</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Reset Password</h2>
  <p>Enter your email and choose a new password</p>

  <input type="email" id="email" placeholder="Email address">
  <input type="password" id="newPassword" placeholder="New password">
  <p id="reset-error" class="form-error"></p>

  <div class="password-rules">
    Password must contain:
    <ul>
      <li>Minimum 10 characters</li>
      <li>Uppercase letter</li>
      <li>Lowercase letter</li>
      <li>Number</li>
      <li>Special character</li>
    </ul>
  </div>

  <div class="strength-container">
    <div id="strength-bar"></div>
  </div>
  <p id="strength-text"></p>

  <button type="button" onclick="resetPassword()" class="primary-btn">Reset Password →</button>

  <p class="link"><a href="index.html">← Back to Login</a></p>
</div>
<script src="toast.js"></script>
<script>
async function resetPassword() {
  const email = document.getElementById("email").value;
  const newPassword = document.getElementById("newPassword").value;
  const errorBox = document.getElementById("reset-error");
  errorBox.textContent = "";

  try {
    const response = await fetch("http://localhost:5000/api/auth/reset-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, newPassword })
    });

    const data = await response.json();
    if (!response.ok) { toast(data.message, "error"); return; }
    toast("Password reset successful!", "success");
    setTimeout(() => window.location.href = "index.html", 1500);

  } catch (err) {
    toast("Server error. Please try again.", "error");
  }
}

const passwordInput = document.getElementById("newPassword");
const strengthBar = document.getElementById("strength-bar");
const strengthText = document.getElementById("strength-text");

passwordInput.addEventListener("input", () => {
  const password = passwordInput.value;
  let strength = 0;
  if (password.length >= 10) strength++;
  if (/[A-Z]/.test(password)) strength++;
  if (/[a-z]/.test(password)) strength++;
  if (/[0-9]/.test(password)) strength++;
  if (/[^A-Za-z0-9]/.test(password)) strength++;

  if (strength <= 2) {
    strengthBar.style.width = "33%";
    strengthBar.style.background = "#ff4f6a";
    strengthText.textContent = "WEAK";
  } else if (strength <= 4) {
    strengthBar.style.width = "66%";
    strengthBar.style.background = "#ffb547";
    strengthText.textContent = "MEDIUM";
  } else {
    strengthBar.style.width = "100%";
    strengthBar.style.background = "#00e09e";
    strengthText.textContent = "STRONG";
  }
});
</script>
</body>
</html>
